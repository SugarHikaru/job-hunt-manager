<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>新規企業登録</title>
  </head>
  <body>
    <h1>新規企業登録</h1>

    <form>
      <label for="companyName">企業名</label>
      <input type="text" id="companyName" name="companyName" />

      <label for="status">選考状況</label>
      <input type="text" id="status" name="status" />

      <label for="esDeadline">ES締切日</label>
      <input type="date" id="esDeadline" name="esDeadline" />

      <label for="interviewDate">面接日程</label>
      <input type="date" id="interviewDate" name="interviewDate" />

      <label for="priority">志望度</label>
      <input type="text" id="priority" name="priority" />

      <label for="note">メモ</label>
      <textarea id="note" name="note"></textarea>

      <button type="submit">登録</button>
    </form>
  </body>
</html>
